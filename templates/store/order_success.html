<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Success</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f7fb;
    text-align:center;
    padding-top:100px;
}

.box{
    background:white;
    padding:40px;
    width:400px;
    margin:auto;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    color:#6C3BFF;
    margin-bottom:20px;
}

p{
    color:#555;
    margin-bottom:30px;
}

a button{
    background:#6C3BFF;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

    <h1>🎉 Order Placed Successfully!</h1>

    <p>Thank you for shopping with EarBuzz ❤️</p>

    <a href="/store/">
        <button>Continue Shopping</button>
    </a>

</div>

</body>
</html>
