<h1>Checkout 🧾</h1>

{% if products %}

    {% for product in products %}
        <p>
            {{ product.name }} - ₹{{ product.price }} x {{ product.qty }}
        </p>
    {% endfor %}

    <h2>Total: ₹{{ total }}</h2>

    <a href="/store/order-success/">
        <button>Place Order</button>
    </a>

{% else %}
    <h2>Your cart is empty 🥲</h2>
{% endif %}

<br><br>

<a href="/store/cart/">⬅ Back to Cart</a>
