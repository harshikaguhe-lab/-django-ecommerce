<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#6a0dad;
        }

        label{
            font-weight:bold;
        }

        input,textarea,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            background:#6a0dad;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:6px;
        }

        button:hover{
            background:black;
        }

    </style>

</head>
<body>

<div class="container">

<h1>Checkout</h1>

<form method="POST">

{% csrf_token %}

<label>Full Name</label>
<input type="text" name="name" required>

<label>Mobile Number</label>
<input type="text" name="mobile" required>

<label>Delivery Address</label>
<textarea name="address" required></textarea>

<label>Payment Method</label>

<select name="payment">

    <option>Cash On Delivery</option>
    <option>UPI</option>
    <option>Credit Card</option>
    <option>Debit Card</option>

</select>

<h2>Total Amount : ₹{{ total }}</h2>

<button type="submit">
Place Order
</button>

</form>

</div>

</body>
</html>
