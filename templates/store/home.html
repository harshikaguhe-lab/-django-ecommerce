<!DOCTYPE html>
<html>
<head>
    <title>My Ecommerce Store</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: black;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .product {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        .btn {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

<header>
    🛍 My Ecommerce Website
</header>

<div class="container">

    <div class="product">
        <h2>Product 1</h2>
        <p>₹499</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="product">
        <h2>Product 2</h2>
        <p>₹999</p>
        <button class="btn">Buy Now</button>
    </div>

</div>

</body>
</html>
