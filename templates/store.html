<!DOCTYPE html>
<html>
<head>
    <title>Store</title>
</head>
<body>

<h1>🛍 Products</h1>

{% for product in products %}
    <div>
        <h2>{{ product.name }}</h2>
        <p>₹ {{ product.price }}</p>
        <p>{{ product.description }}</p>
    </div>
    <hr>
{% empty %}
    <p>No products found</p>
{% endfor %}

</body>
</html>
